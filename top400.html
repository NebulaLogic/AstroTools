<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>AstroTools – TOP 400</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    header {
      background: #1e293b;
      padding: 20px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      color: #fff;
      border-bottom: 2px solid #334155;
    }

    nav {
      background: #0f172a;
      padding: 10px 20px;
      border-bottom: 1px solid #1e293b;
    }

    nav a {
      color: #38bdf8;
      text-decoration: none;
      margin-right: 20px;
      font-size: 16px;
    }

    nav a:hover {
      text-decoration: underline;
    }

    main {
      padding: 20px;
      max-width: 900px; /* 🔥 TABLA MÁS ESTRECHA */
      margin: auto;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 20px;
      font-size: 14px;
      background: #0b1220;
      table-layout: fixed; /* 🔥 COLUMNAS COMPACTAS */
    }

    th, td {
      border: 1px solid #1e293b;
      padding: 4px 6px;
      text-align: left;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: default;
    }

    th {
      background: #1e293b;
      color: #f1f5f9;
      position: sticky;
      top: 0;
      z-index: 2;
      cursor: pointer;
    }

    tr:nth-child(even) {
      background: #111a2e;
    }

    tr:hover {
      background: #1e2a44;
    }

    /* 🔥 COLUMNAS MÁS ESTRECHAS */
    th:nth-child(1), td:nth-child(1) { width: 40px; }
    th:nth-child(2), td:nth-child(2) { width: 180px; } /* Jugador */
    th:nth-child(3), td:nth-child(3) { width: 120px; } /* Recursos */
    th:nth-child(4), td:nth-child(4) { width: 90px; }  /* Inactivo */

    .inactivo-si {
      color: #9ca3af;
      font-weight: bold;
    }

    .inactivo-no {
      color: #f8fafc;
    }

    footer {
      margin-top: 40px;
      background: #1e293b;
      padding: 15px;
      text-align: center;
      color: #94a3b8;
      font-size: 14px;
      border-top: 2px solid #334155;
    }
  </style>
</head>
<body>

  <header>
    AstroTools – TOP 400
  </header>

  <nav>
    <a href="index.html">Inicio</a>
    <a href="data/jugadores_top400_inactividad.csv">Descargar CSV</a>
  </nav>

  <main>
    <h1>Tabla TOP 400</h1>
    <p>Datos generados automáticamente por el script de escaneo.</p>

    <p id="fechaCSV" style="margin-top:10px; color:#94a3b8;"></p>

    <div id="estado">Cargando datos…</div>

    <table id="tabla" style="display:none;">
      <thead>
        <tr>
          <th>#</th>
          <th>Jugador</th>
          <th>Recursos</th>
          <th>Inactivo</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </main>

  <footer>
    AstroTools © 2026 – NebulaLogic
  </footer>

  <script>
    let datosGlobales = [];
    let ordenInactivoAsc = true;
    let ordenRecursosAsc = false;

    async function cargarCSV() {
      const estado = document.getElementById('estado');
      const tabla = document.getElementById('tabla');

      try {
        const resp = await fetch('data/jugadores_top400_inactividad.csv?' + Date.now());
        const texto = await resp.text();

        const lineas = texto.trim().split('\n');
        const datos = lineas.slice(1).map(l => {
          const partes = l.split(',');
          return {
            nombre: partes[0],
            recursos: Number(partes[1] || 0),
            inactivo: (partes[2] || '').trim()
          };
        });

        datos.sort((a, b) => b.recursos - a.recursos);

        datosGlobales = datos;
        renderTabla(datos);

        estado.style.display = 'none';
        tabla.style.display = 'table';

      } catch (e) {
        estado.textContent = 'Error cargando el CSV: ' + e;
      }
    }

    function renderTabla(datos) {
      const tbody = document.querySelector("#tabla tbody");
      tbody.innerHTML = "";

      datos.forEach((j, i) => {
        const clase = j.inactivo.toLowerCase().startsWith("s")
          ? 'inactivo-si'
          : 'inactivo-no';

        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${i + 1}</td>
          <td class="${clase}">${j.nombre}</td>
          <td class="${clase}">${j.recursos.toLocaleString('es-ES')}</td>
          <td class="${clase}">${j.inactivo}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    async function mostrarFechaCSV() {
      const fechaElem = document.getElementById("fechaCSV");

      try {
        const resp = await fetch('data/jugadores_top400_inactividad.csv?' + Date.now(), {
          method: 'HEAD'
        });

        const mod = resp.headers.get("Last-Modified");

        if (mod) {
          const fecha = new Date(mod);
          const opciones = {
            year: "numeric",
            month: "long",
            day: "numeric",
            hour: "2-digit",
            minute: "2-digit"
          };

          fechaElem.textContent = "Última actualización del CSV: " + fecha.toLocaleString("es-ES", opciones);
        } else {
          fechaElem.textContent = "No se pudo obtener la fecha del archivo.";
        }

      } catch (e) {
        fechaElem.textContent = "Error obteniendo la fecha del CSV.";
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      const thInactivo = document.querySelector("th:nth-child(4)");
      const thRecursos = document.querySelector("th:nth-child(3)");

      thInactivo.addEventListener("click", () => {
        datosGlobales.sort((a, b) => {
          const ia = a.inactivo.toLowerCase().startsWith("s") ? 1 : 0;
          const ib = b.inactivo.toLowerCase().startsWith("s") ? 1 : 0;

          if (ia !== ib) return ordenInactivoAsc ? ib - ia : ia - ib;

          return b.recursos - a.recursos;
        });

        ordenInactivoAsc = !ordenInactivoAsc;
        renderTabla(datosGlobales);
      });

      thRecursos.addEventListener("click", () => {
        datosGlobales.sort((a, b) => {
          return ordenRecursosAsc
            ? a.recursos - b.recursos
            : b.recursos - a.recursos;
        });

        ordenRecursosAsc = !ordenRecursosAsc;
        renderTabla(datosGlobales);
      });
    });

    cargarCSV();
    mostrarFechaCSV();
  </script>

</body>
</html>
