<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>AstroTools – TOP 400</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    header {
      background: #1e293b;
      padding: 20px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      color: #fff;
      border-bottom: 2px solid #334155;
    }

    nav {
      background: #0f172a;
      padding: 10px 20px;
      border-bottom: 1px solid #1e293b;
    }

    nav a {
      color: #38bdf8;
      text-decoration: none;
      margin-right: 20px;
      font-size: 16px;
    }

    nav a:hover {
      text-decoration: underline;
    }

    main {
      padding: 20px;
      max-width: 1200px;
      margin: auto;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 20px;
      font-size: 14px;
    }

    th, td {
      border: 1px solid #1e293b;
      padding: 6px 8px;
      text-align: left;
    }

    th {
      background: #1e293b;
      position: sticky;
      top: 0;
      z-index: 2;
    }

    tr:nth-child(even) {
      background: #162033;
    }

    /* 🔥 NUEVO: estilo para inactivos */
    .inactivo-si {
      color: #6b7280; /* gris */
      font-weight: bold;
    }

    .inactivo-no {
      color: #e2e8f0;
    }

    footer {
      margin-top: 40px;
      background: #1e293b;
      padding: 15px;
      text-align: center;
      color: #94a3b8;
      font-size: 14px;
      border-top: 2px solid #334155;
    }
  </style>
</head>
<body>

  <header>
    AstroTools – TOP 400
  </header>

  <nav>
    <a href="index.html">Inicio</a>
    <a href="data/jugadores_top400_inactividad.csv">Descargar CSV</a>
  </nav>

  <main>
    <h1>Tabla TOP 400</h1>
    <p>Datos generados automáticamente por el script de escaneo.</p>

    <div id="estado">Cargando datos…</div>

    <table id="tabla" style="display:none;">
      <thead>
        <tr>
          <th>#</th>
          <th>Nombre</th>
          <th>Recursos</th>
          <th>Inactivo</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </main>

  <footer>
    AstroTools © 2026 – NebulaLogic
  </footer>

  <script>
    async function cargarCSV() {
      const estado = document.getElementById('estado');
      const tabla = document.getElementById('tabla');
      const tbody = tabla.querySelector('tbody');

      try {
        const resp = await fetch('data/jugadores_top400_inactividad.csv?' + Date.now());
        const texto = await resp.text();

        const lineas = texto.trim().split('\n');
        const datos = lineas.slice(1).map(l => {
          const partes = l.split(',');
          return {
            nombre: partes[0],
            recursos: Number(partes[1] || 0),
            inactivo: (partes[2] || '').trim()
          };
        });

        datos.sort((a, b) => b.recursos - a.recursos);

        tbody.innerHTML = '';
        datos.forEach((j, i) => {
          const clase = j.inactivo.toLowerCase() === 'sí' || j.inactivo.toLowerCase() === 'si'
            ? 'inactivo-si'
            : 'inactivo-no';

          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${i + 1}</td>
            <td class="${clase}">${j.nombre}</td>
            <td class="${clase}">${j.recursos.toLocaleString('es-ES')}</td>
            <td class="${clase}">${j.inactivo}</td>
          `;
          tbody.appendChild(tr);
        });

        estado.style.display = 'none';
        tabla.style.display = 'table';

      } catch (e) {
        estado.textContent = 'Error cargando el CSV: ' + e;
      }
    }

    cargarCSV();
  </script>

</body>
</html>
