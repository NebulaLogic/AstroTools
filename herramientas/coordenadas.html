<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>AstroTools – Coordenadas</title>
  <style>
    body { font-family: system-ui, sans-serif; background:#0b0c10; color:#eee; margin:0; padding:20px; }
    h1 { margin-top:0; }
    .controls { margin-bottom:15px; display:flex; gap:10px; flex-wrap:wrap; }
    input[type="text"] { padding:6px 8px; border-radius:4px; border:1px solid #444; background:#111; color:#eee; }
    table { border-collapse:collapse; width:100%; font-size:14px; }
    th, td { border:1px solid #333; padding:4px 6px; text-align:left; }
    th { background:#15171f; cursor:pointer; position:sticky; top:0; z-index:1; }
    tr:nth-child(even) { background:#11141c; }
    tr:nth-child(odd) { background:#0c0f17; }
    tr.hide { display:none; }
    .small { font-size:12px; color:#aaa; }
  </style>
</head>
<body>
  <h1>Coordenadas escaneadas – AstroTools</h1>
  <div class="small">
    Fuente CSV: <code>data/coordenadas/universo_6x400_ajaxsync.csv</code>
  </div>

  <div class="controls">
    <input id="search" type="text" placeholder="Buscar jugador o coordenada…">
    <span class="small" id="status">Cargando datos…</span>
  </div>

  <div style="overflow:auto; max-height:80vh;">
    <table id="tabla">
      <thead id="thead"></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <script>
    const CSV_URL = "https://nebulalogic.github.io/AstroTools/data/coordenadas/universo_6x400_ajaxsync.csv";

    const thead = document.getElementById("thead");
    const tbody = document.getElementById("tbody");
    const searchInput = document.getElementById("search");
    const statusSpan = document.getElementById("status");

    let tableData = [];
    let sortState = { col: 0, asc: true };

    async function loadCSV() {
      try {
        const resp = await fetch(CSV_URL + "?t=" + Date.now());
        if (!resp.ok) throw new Error("HTTP " + resp.status);
        const text = await resp.text();
        parseCSV(text);
        statusSpan.textContent = "Datos cargados (" + tableData.length + " filas).";
      } catch (e) {
        console.error(e);
        statusSpan.textContent = "Error cargando CSV.";
      }
    }

    function parseCSV(text) {
      const lines = text.trim().split(/\r?\n/);
      if (lines.length === 0) return;

      const headers = lines[0].split(";");
      const rows = lines.slice(1).map(line => line.split(";"));

      tableData = rows;

      renderHeader(headers);
      renderBody(tableData);
    }

    function renderHeader(headers) {
      thead.innerHTML = "";
      const tr = document.createElement("tr");
      headers.forEach((h, idx) => {
        const th = document.createElement("th");
        th.textContent = h || ("Jugador " + (idx + 1));
        th.addEventListener("click", () => sortByColumn(idx));
        tr.appendChild(th);
      });
      thead.appendChild(tr);
    }

    function renderBody(data) {
      tbody.innerHTML = "";
      data.forEach(row => {
        const tr = document.createElement("tr");
        row.forEach(cell => {
          const td = document.createElement("td");
          td.textContent = cell;
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
      applyFilter();
    }

    function sortByColumn(colIndex) {
      if (sortState.col === colIndex) {
        sortState.asc = !sortState.asc;
      } else {
        sortState.col = colIndex;
        sortState.asc = true;
      }
      tableData.sort((a, b) => {
        const va = (a[colIndex] || "").toLowerCase();
        const vb = (b[colIndex] || "").toLowerCase();
        if (va < vb) return sortState.asc ? -1 : 1;
        if (va > vb) return sortState.asc ? 1 : -1;
        return 0;
      });
      renderBody(tableData);
    }

    function applyFilter() {
      const q = searchInput.value.trim().toLowerCase();
      const rows = Array.from(tbody.querySelectorAll("tr"));
      if (!q) {
        rows.forEach(r => r.classList.remove("hide"));
        return;
      }
      rows.forEach(r => {
        const text = r.textContent.toLowerCase();
        if (text.includes(q)) r.classList.remove("hide");
        else r.classList.add("hide");
      });
    }

    searchInput.addEventListener("input", applyFilter);

    loadCSV();
  </script>
</body>
</html>
